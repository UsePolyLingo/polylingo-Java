# Deploy to Maven Central Portal when a version tag is pushed.
# One-time setup: register at https://central.sonatype.com, claim namespace
# com.usepolylingo, generate a user token, generate a GPG key.
# Required GitHub secrets:
#   CENTRAL_TOKEN_USERNAME  — user token username from central.sonatype.com
#   CENTRAL_TOKEN_PASSWORD  — user token password from central.sonatype.com
#   GPG_PRIVATE_KEY         — armored private key (gpg --armor --export-secret-keys)
#   GPG_PASSPHRASE          — passphrase for the GPG key
#
# After this job succeeds the bundle is validated on central.sonatype.com.
# Go to https://central.sonatype.com/publishing/deployments and click Publish.
# The bundle zip is also uploaded as a workflow artifact if you prefer direct upload.
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Deploy to Maven Central (upload + validate, manual publish)
        run: mvn -B --no-transfer-progress deploy -P release
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Upload bundle as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: central-bundle
          path: target/central-publishing/central-bundle.zip
          if-no-files-found: warn
